    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent; 
        }

        /* Modern Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Sidebar Transition */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Glass Effect */
        .glass-header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .active-nav {
            background: #EFF6FF !important; /* Blue-50 */
            color: #2563EB !important;      /* Blue-600 */
            border-left: 4px solid #2563EB;
        }
        
        /* Animation */
        .skeleton {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
        }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>

            <a href="#finance" class="nav-item flex items-center px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group" data-title="Finance">

                <div id="market-dropdown" class="hidden pl-11 pr-2 space-y-1 mt-1 overflow-hidden transition-all duration-300">

                    <a href="#massage" class="flex items-center gap-2 px-3 py-2 text-xs font-bold text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition">

            <p class="px-3 pt-4 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Productivity</p>

            <a href="#notekun" class="nav-item flex items-center px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group" data-title="Notekun">
                <i class="fas fa-sticky-note w-8 text-center text-slate-400 group-hover:text-blue-500"></i> Notekun

            <a href="#projects" class="nav-item flex items-center px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group" data-title="Projects">

            </a>

            <a href="#schedule" class="nav-item flex items-center px-3 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg transition-colors group" data-title="Schedule">
                <i class="fas fa-calendar-alt w-8 text-center text-slate-400 group-hover:text-blue-500"></i> Schedule

            <p class="px-3 pt-4 pb-1 text-[10px] font-bold text-slate-400 uppercase tracking-wider">System</p>

            </button>

    <div class="md:ml-[260px] flex flex-col min-h-screen transition-all duration-300">
        
        <header id="main-header" class="sticky top-0 z-40 glass-header border-b border-slate-200 h-16 flex items-center justify-between px-4 md:px-8 transition-transform duration-500 ease-in-out">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-slate-600 p-2 -ml-2 rounded-xl hover:bg-slate-100 transition active:scale-90">
                    <i class="fa-solid fa-bars-staggered text-xl"></i>
                </button>
                
                <h2 id="header-title" class="text-lg font-bold text-slate-900 hidden md:block">Dashboard</h2>
                
                <div class="md:hidden block">
                     <img src="logo/logo.png" alt="Logo" class="h-8 w-auto">
                </div>
            </div>

            <div class="flex items-center gap-3 md:gap-4">
                <button class="w-10 h-10 rounded-full hover:bg-slate-100 text-slate-500 transition hidden sm:flex items-center justify-center">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                
                <a href="#notification" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-500 flex items-center justify-center relative hover:bg-slate-50 transition active:scale-95 cursor-pointer">
    <i class="fa-regular fa-bell"></i>
    <span id="nav-unread-badge" class="absolute top-2.5 right-2.5 h-2 w-2 bg-red-500 rounded-full border border-white"></span>
</a>

                <button onclick="window.location.hash = '#settings'" class="w-9 h-9 rounded-full bg-slate-200 overflow-hidden border border-slate-200 shadow-sm transition hover:ring-2 hover:ring-blue-100 cursor-pointer">

        </header>

        <main class="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full pb-32" id="content-area">
            
            <div class="space-y-8 animate-fade-in">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="space-y-2">
                        <div class="h-8 w-48 skeleton rounded-lg"></div>
                        <div class="h-4 w-64 skeleton rounded-lg"></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="h-32 skeleton rounded-2xl"></div>
                    <div class="h-32 skeleton rounded-2xl"></div>
                    <div class="h-32 skeleton rounded-2xl"></div>
                    <div class="h-32 skeleton rounded-2xl"></div>
                </div>
                <div class="h-[400px] skeleton rounded-2xl"></div>
            </div>

        </main>
    </div>

    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>

<nav id="bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 z-[100] bg-white border-t border-slate-100 shadow-[0_-5px_20px_rgba(0,0,0,0.1)] transition-transform duration-500 ease-in-out">
    
    <div class="flex items-center justify-around h-16 relative px-2">
        
        
        <a href="#dashboard" class="nav-item-bottom flex flex-col items-center justify-center flex-1 text-blue-600 transition-all">
            <i class="fi fi-rr-home text-xl"></i>
            <span class="text-[10px] font-semibold mt-0.5">Home</span>
        </a>

        <a href="#content" class="nav-item-bottom flex flex-col items-center justify-center flex-1 text-slate-400 transition-all">
            <i class="fi fi-rr-apps text-xl"></i>
            <span class="text-[10px] font-medium mt-0.5">Library</span>
        </a>

        <div class="flex-1 flex justify-center -mt-6">
            <a href="#publish" class="flex items-center justify-center w-14 h-14 bg-orange-500 text-white rounded-full shadow-[0_4px_15px_rgba(249,115,22,0.4)] border-4 border-white active:scale-95 transition-transform">
                <i class="fi fi-rr-plus text-2xl"></i>
            </a>
        </div>

        <a href="#schedule" class="nav-item-bottom flex flex-col items-center justify-center flex-1 text-slate-400 transition-all">
            <i class="fi fi-rr-calendar text-xl"></i>
            <span class="text-[10px] font-medium mt-0.5">Schedule</span>
        </a>

        <a href="#finance" class="nav-item-bottom flex flex-col items-center justify-center flex-1 text-slate-400 transition-all">
           <i class="fi fi-rr-bank text-xl"></i>
           <span class="text-[10px] font-medium mt-0.5">Finance</span>
         </a>
    </div>
</nav>

    <script type="module">
        // IMPORT PATH CHECK KAREN: Agar firebase.js js folder me hai to "./js/firebase.js" use karein.
        // Agar root folder me hai to "./firebase.js" use karein.
        import { db, auth } from "./js/firebase.js"; 
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const headerImg = document.getElementById('header-profile-img');
                
                if (headerImg) {
                    try {
                        // Marketplace.js jaisa same default avatar
                        const DEFAULT_AVATAR = "https://ui-avatars.com/api/?name=User&background=f1f5f9&color=64748b";
                        let avatarUrl = DEFAULT_AVATAR;
                        
                        // Firebase "sellers" collection se data fetch karna
                        const sellerSnap = await getDoc(doc(db, "sellers", user.uid));
                        
                        if (sellerSnap.exists()) {
                            const data = sellerSnap.data();
                            // Priority 1: shopLogo, Priority 2: Google photoURL, Priority 3: Default
                            avatarUrl = data.shopLogo || user.photoURL || DEFAULT_AVATAR;
                        } else if (user.photoURL) {
                            // Agar seller profile nahi hai par Google login ki photo hai
                            avatarUrl = user.photoURL;
                        } else if (user.displayName) {
                            // Agar kuch nahi hai to naam ka pehla letter
                            avatarUrl = `https://ui-avatars.com/api/?name=${user.displayName}&background=f1f5f9&color=64748b`;
                        }

                        // UI me image update karna
                        headerImg.src = avatarUrl;

                    } catch (error) {
                        console.error("Header profile image load error:", error);
                        // Error aane par bhi default image set kar do
                        headerImg.src = "https://ui-avatars.com/api/?name=User&background=f1f5f9&color=64748b";
                    }
                }
            }
        });
    
        // --- Sidebar Toggle Logic ---
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                overlay.style.opacity = '0';
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            }
        }

        // --- Marketplace Dropdown Logic ---
        window.toggleMarketDropdown = function() {
            const menu = document.getElementById('market-dropdown');
            const arrow = document.getElementById('market-arrow');
            const isHidden = menu.classList.contains('hidden');
            
            if (isHidden) {
                menu.classList.remove('hidden');
                menu.style.maxHeight = '0';
                setTimeout(() => {
                    menu.style.transition = 'max-height 0.3s ease-out';
                    menu.style.maxHeight = '200px';
                }, 10);
                arrow.style.transform = 'rotate(180deg)';
            } else {
                menu.style.maxHeight = '0';
                setTimeout(() => menu.classList.add('hidden'), 300);
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // --- Active State Logic ---
        window.addEventListener('hashchange', updateActiveState);
        
        function updateActiveState() {
            const hash = window.location.hash || '#dashboard';
            const sidebarLinks = document.querySelectorAll('.nav-item');
            const headerTitle = document.getElementById('header-title');

            sidebarLinks.forEach(link => {
                const linkHash = link.getAttribute('href');
                if (linkHash === hash) {
                    link.classList.add('active-nav');
                    link.classList.remove('text-slate-600', 'hover:bg-slate-50');
                    if (headerTitle) headerTitle.textContent = link.getAttribute('data-title');
                } else {
                    link.classList.remove('active-nav');
                    link.classList.add('text-slate-600', 'hover:bg-slate-50');
                }
            });
            
            const bottomLinks = document.querySelectorAll('nav.fixed.bottom-0 a'); // Updated to match your bottom nav
            bottomLinks.forEach(link => {
                 if(link.getAttribute('href') === hash) {
                     link.classList.add('text-blue-600');
                     link.classList.remove('text-slate-400');
                 } else {
                     link.classList.remove('text-blue-600');
                     link.classList.add('text-slate-400');
                 }
            });

            if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        }

        // --- Scroll Logic ---
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            const bottomNav = document.getElementById('bottom-nav');
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 50) {
                header.style.transform = 'translateY(-100%)';
                if(bottomNav) {
                    bottomNav.style.transform = 'translateY(150%)'; 
                }
            } else {
                header.style.transform = 'translateY(0)';
                if(bottomNav) {
                    bottomNav.style.transform = 'translateY(0)';
                }
            }
            lastScrollTop = scrollTop;
        });

        document.addEventListener('DOMContentLoaded', updateActiveState);
        
        // --- Logout Logic ---
        window.logout = function() {
            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of your session",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, logout!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await auth.signOut();
                        window.location.href = '/login'; // Adjust login path if needed
                    } catch (error) {
                        console.error("Logout error", error);
                    }
                }
            })
        }
    </script>
    <script type="module" src="js/app.js"></script>
