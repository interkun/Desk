<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="bg-[#a3a3a3] p-4 flex justify-between items-center">
            <div>
                <h2 id="card-shop-name" class="text-lg font-black text-black mb-1">Loading...</h2>
                <div id="creator-rating-badge">
                    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-slate-100 text-[10px] font-bold text-slate-500">
                        <i class="fa-solid fa-star"></i> Loading...
                    </span>
                </div>
            </div>
            <div class="relative">
                <img id="card-avatar" src="https://via.placeholder.com/150" class="w-16 h-16 rounded-full object-cover border-2 border-white shadow-sm">
            </div>
        </div>
        <div id="card-plan-strip" class="bg-black p-2.5 flex items-center gap-2">
            <span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider italic ml-2">Loading plan...</span>
        </div>
    </div>

    <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Plan</h3>
            <span id="current-commission-badge" class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[9px] font-black border border-slate-200">
                10% Fee
            </span>
        </div>

        <div class="space-y-3">
            <div id="plan-free" onclick="window.buySubscription('free')" class="flex justify-between items-center p-3 border border-slate-100 bg-white rounded-2xl cursor-pointer hover:border-slate-200 transition active:scale-[0.98]">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-slate-50 text-slate-500 flex items-center justify-center shadow-sm">
                        <i class="fas fa-seedling text-xs"></i>
                    </div>
                    <div>
                        <h4 class="text-xs font-black text-slate-800">Starter Plan</h4>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">Standard features</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-slate-900">FREE</span>
                    <i class="fas fa-check-circle text-green-500 hidden active-icon text-lg"></i>
                </div>
            </div>

            <div id="plan-pro" onclick="window.buySubscription('pro')" class="flex justify-between items-center p-3 border border-slate-100 bg-white rounded-2xl cursor-pointer hover:border-blue-200 transition active:scale-[0.98]">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shadow-sm">
                        <i class="fas fa-crown text-xs"></i>
                    </div>
                    <div>
                        <h4 class="text-xs font-black text-slate-800">Creator Pro</h4>
                        <p class="text-[9px] text-blue-500 font-bold uppercase">5% Platform Fee</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-slate-900">₹1999</span>
                    <i class="fas fa-check-circle text-green-500 hidden active-icon text-lg"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Profile Details</h3>
        <form onsubmit="window.handleUpdateProfile(event)" class="space-y-3">
            <div class="flex gap-2">
                <input type="text" id="display-name-input" placeholder="Display Name" class="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 outline-none focus:border-blue-500 transition">
                <button type="submit" class="px-4 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-bold hover:bg-black transition active:scale-95">Update</button>
            </div>
            <div class="px-1">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Email Address</p>
                <p id="display-email-text" class="text-xs font-bold text-slate-600">loading...</p>
            </div>
        </form>
    </div>
    
    <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Integrations</h3>
        <div class="flex justify-between items-center p-3 border border-slate-100 bg-white rounded-2xl transition-all" id="google-integration-box">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shadow-sm">
                    <i class="fa-brands fa-google text-lg"></i>
                </div>
                <div>
                    <h4 class="text-xs font-black text-slate-800">Google Meet</h4>
                    <p id="google-status-text" class="text-[9px] text-slate-500 font-bold uppercase">Not Connected</p>
                </div>
            </div>
            <button id="btn-google-connect" onclick="window.connectGoogleCalendar()" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-bold shadow-sm hover:bg-blue-700 transition active:scale-95">
                Connect
            </button>
        </div>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
        <button onclick="window.handlePasswordReset()" class="py-3.5 bg-white border border-slate-200 rounded-3xl text-[11px] font-bold text-slate-600 hover:bg-slate-50 transition active:scale-95 flex items-center justify-center gap-2">
            <i class="fas fa-key text-slate-400"></i> Password
        </button>
        
        <button id="btn-logout" onclick="window.handleLogout()" class="py-3.5 bg-white border border-slate-200 rounded-3xl text-[11px] font-bold text-red-500 hover:bg-red-50 transition active:scale-95 flex items-center justify-center gap-2">
            <i class="fa-solid fa-power-off"></i> <span id="txt-logout">Log Out</span>
        </button>
    </div>

</div>
