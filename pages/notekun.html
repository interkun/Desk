<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-2">
        <div class="p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="w-full md:w-auto flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                        <i class="fas fa-sticky-note text-yellow-500"></i> Notekun
                    </h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Ideas & Scripts</p>
                </div>
                <button onclick="window.openNoteModal()" class="md:hidden bg-slate-900 text-white w-10 h-10 rounded-2xl shadow-lg hover:bg-black active:scale-95 transition flex items-center justify-center">
                    <i class="fas fa-plus text-sm"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-64">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                    <input type="text" onkeyup="window.handleSearchNote(event)" placeholder="SEARCH NOTES..." 
                        class="w-full pl-10 pr-4 py-3 bg-yellow-50/50 border border-yellow-100 rounded-2xl text-[11px] font-black uppercase tracking-wider outline-none focus:border-yellow-400 transition text-slate-700 placeholder:text-slate-400">
                </div>

                <button onclick="window.openNoteModal()" class="hidden md:flex bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-sm hover:bg-black active:scale-95 transition items-center gap-2">
                    <i class="fas fa-plus text-xs"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest">New Note</span>
                </button>
            </div>
        </div>
        <div class="bg-black p-2.5 flex items-center gap-2">
            <span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider italic ml-2">Quick Capture Active</span>
        </div>
    </div>

    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
        <button onclick="window.filterNotes('all')" id="filter-all" class="filter-btn active px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-900 text-white shadow-sm transition-all whitespace-nowrap">All Notes</button>
        <button onclick="window.filterNotes('script')" id="filter-script" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">🎬 Scripts</button>
        <button onclick="window.filterNotes('sponsor')" id="filter-sponsor" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">💰 Sponsors</button>
        <button onclick="window.filterNotes('todo')" id="filter-todo" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">✅ To-Do</button>
        <div class="flex-1"></div>
        <button onclick="window.filterNotes('trash')" id="filter-trash" class="w-10 h-10 flex items-center justify-center rounded-2xl text-red-400 bg-white border border-slate-200 hover:bg-red-50 hover:text-red-600 transition-all"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div class="relative min-h-[400px]">
        <div id="notes-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
            </div>
        
        <div id="loading-indicator" class="hidden py-12 flex justify-center w-full">
            <i class="fas fa-circle-notch fa-spin text-indigo-500 text-2xl"></i>
        </div>
        
        <div id="empty-state" class="hidden flex-col items-center justify-center py-32 text-slate-300">
            <div class="w-16 h-16 bg-slate-50 rounded-[2rem] flex items-center justify-center mb-4">
                <i class="fas fa-sticky-note text-2xl opacity-30"></i>
            </div>
            <p class="text-[10px] font-black uppercase tracking-widest">No notes found</p>
            <p class="text-[9px] font-bold text-slate-400 mt-2">Tap 'New Note' to start writing</p>
        </div>
    </div>

</div>

<div id="noteModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="window.closeNoteModal()"></div>
    
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative animate-slideUp max-h-[90vh] flex flex-col border border-slate-100">
        
        <div class="flex justify-between items-start mb-6 gap-4">
            <div class="flex-1">
                <input type="text" id="note-title" placeholder="UNTITLED NOTE" 
                    class="text-xl font-black text-slate-900 bg-transparent outline-none w-full placeholder:text-slate-200 tracking-tight uppercase">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Editing Draft</p>
            </div>
            <button onclick="window.closeNoteModal()" class="w-10 h-10 rounded-2xl bg-slate-50 text-slate-500 hover:bg-slate-100 flex items-center justify-center flex-shrink-0 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="flex flex-wrap gap-3 items-center mb-6 bg-slate-50/80 p-3 rounded-2xl border border-slate-100">
            <select id="note-category" class="px-3 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-700 outline-none uppercase tracking-widest">
                <option value="general">📝 GENERAL</option>
                <option value="script">🎬 SCRIPT</option>
                <option value="sponsor">💰 SPONSOR</option>
                <option value="todo">✅ TO-DO</option>
            </select>
            
            <div class="h-6 w-px bg-slate-200 mx-1"></div>

            <div class="flex gap-2">
                <button onclick="window.selectColor('white')" id="col-white" class="w-6 h-6 rounded-full border border-slate-200 bg-white ring-2 ring-slate-900 ring-offset-2 transition-transform"></button>
                <button onclick="window.selectColor('yellow')" id="col-yellow" class="w-6 h-6 rounded-full border border-yellow-200 bg-yellow-100 hover:scale-110 transition"></button>
                <button onclick="window.selectColor('blue')" id="col-blue" class="w-6 h-6 rounded-full border border-blue-200 bg-blue-100 hover:scale-110 transition"></button>
                <button onclick="window.selectColor('red')" id="col-red" class="w-6 h-6 rounded-full border border-red-200 bg-red-100 hover:scale-110 transition"></button>
            </div>
            
            <div class="ml-auto">
                <label class="cursor-pointer group">
                    <input type="checkbox" id="notePinned" class="sr-only peer">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center border border-slate-200 bg-white peer-checked:bg-orange-50 peer-checked:border-orange-200 transition">
                        <i class="fas fa-thumbtack text-xs text-slate-300 peer-checked:text-orange-500 transform peer-checked:rotate-45 transition-all"></i>
                    </div>
                </label>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar min-h-[250px]">
            <div class="relative h-full">
                <textarea id="note-content" placeholder="Type your idea or script here..." 
                    class="w-full h-full min-h-[250px] text-sm font-medium text-slate-700 leading-relaxed outline-none resize-none bg-transparent placeholder:text-slate-300"></textarea>
                
                <div id="checklist-container" class="hidden space-y-3">
                    <div id="checklist-items" class="space-y-3"></div>
                    <button type="button" onclick="window.addChecklistItem()" class="text-[10px] font-black text-blue-600 hover:text-blue-800 tracking-widest uppercase mt-4">+ Add New Item</button>
                </div>
            </div>
        </div>

        <div class="pt-6 mt-4 border-t border-slate-100 flex justify-between items-center">
            <button onclick="window.toggleChecklistMode()" id="checklistBtn" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 bg-slate-50 hover:bg-slate-100 flex items-center gap-2 transition">
                <i class="fas fa-list-ul"></i> Checklist
            </button>
            <button onclick="window.handleSaveNote()" id="saveNoteBtn" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl hover:bg-black transition active:scale-95">
                Save Note
            </button>
        </div>
        
        <input type="hidden" id="noteId">
        <input type="hidden" id="selectedColor" value="white">
    </div>
</div>
