<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="bg-white p-4 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-calendar-check text-indigo-600"></i> Content Schedule
                </h2>
                <div id="schedule-status-badge">
                    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-slate-100 text-[10px] font-bold text-slate-500">
                        <i class="fa-solid fa-bolt"></i> Automation Active
                    </span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.openScheduleModal()" class="md:hidden bg-slate-900 text-white w-10 h-10 rounded-2xl shadow-sm hover:bg-black active:scale-95 transition flex items-center justify-center">
                    <i class="fas fa-plus text-sm"></i>
                </button>
                <button onclick="window.openScheduleModal()" class="hidden md:flex bg-slate-900 text-white px-5 py-2.5 rounded-2xl shadow-sm hover:bg-black active:scale-95 transition items-center gap-2">
                    <i class="fas fa-calendar-plus text-xs"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest">Schedule New</span>
                </button>
            </div>
        </div>
        <div class="bg-black p-2.5 flex items-center gap-2">
            <span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider italic ml-2">Smart Queue Manager</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 h-auto lg:h-[calc(100vh-220px)]">
        
        <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-[500px] lg:h-full">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Monthly Planner</h3>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-slate-900"></span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase">Today</span>
                </div>
            </div>
            
            <div id="calendar-view" class="flex-1 p-3 overflow-y-auto custom-scrollbar">
                <div class="flex flex-col items-center justify-center h-full text-slate-300">
                    <i class="fas fa-circle-notch fa-spin text-xl mb-3"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Loading Calendar...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-[400px] lg:h-full">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Up Next</h3>
                <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[9px] font-black border border-slate-200">
                    Queue
                </span>
            </div>
            
            <div id="upcoming-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                <div class="text-center py-12 text-slate-300">
                    <i class="far fa-calendar-times text-2xl mb-2 opacity-30"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">No Projects Queued</p>
                </div>
            </div>
        </div>

    </div>

</div>

<div id="scheduleModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="window.closeScheduleModal()"></div>
    
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative animate-slideUp max-h-[90vh] overflow-y-auto border border-slate-100">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h3 class="text-xl font-black text-slate-900">Schedule</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Automate your content</p>
            </div>
            <button onclick="window.closeScheduleModal()" class="w-10 h-10 rounded-2xl bg-slate-50 text-slate-500 hover:bg-slate-100 flex items-center justify-center transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form id="scheduleForm" onsubmit="window.handleSchedule(event)" class="space-y-6">
            
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Select Project</label>
                <div class="relative">
                    <select id="schedulePostId" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs text-slate-700 outline-none focus:ring-2 focus:ring-slate-900 appearance-none transition-all">
                        <option value="">-- Loading --</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-4 top-4 text-slate-400 text-xs pointer-events-none"></i>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Publish To</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer group">
                        <input type="checkbox" name="platforms" value="YouTube" class="peer sr-only">
                        <div class="flex flex-col items-center justify-center p-3 border border-slate-100 rounded-2xl transition-all peer-checked:border-red-500 peer-checked:bg-red-50 hover:bg-slate-50">
                            <i class="fab fa-youtube text-xl text-slate-300 peer-checked:text-red-600 transition-colors mb-1"></i>
                            <span class="text-[9px] font-bold text-slate-400 peer-checked:text-red-700">YouTube</span>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="checkbox" name="platforms" value="Instagram" class="peer sr-only">
                        <div class="flex flex-col items-center justify-center p-3 border border-slate-100 rounded-2xl transition-all peer-checked:border-pink-500 peer-checked:bg-pink-50 hover:bg-slate-50">
                            <i class="fab fa-instagram text-xl text-slate-300 peer-checked:text-pink-600 transition-colors mb-1"></i>
                            <span class="text-[9px] font-bold text-slate-400 peer-checked:text-pink-700">Instagram</span>
                        </div>
                    </label>
                    <label class="cursor-pointer group">
                        <input type="checkbox" name="platforms" value="LinkedIn" class="peer sr-only">
                        <div class="flex flex-col items-center justify-center p-3 border border-slate-100 rounded-2xl transition-all peer-checked:border-blue-500 peer-checked:bg-blue-50 hover:bg-slate-50">
                            <i class="fab fa-linkedin text-xl text-slate-300 peer-checked:text-blue-600 transition-colors mb-1"></i>
                            <span class="text-[9px] font-bold text-slate-400 peer-checked:text-blue-700">LinkedIn</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Date</label>
                    <input type="date" id="scheduleDate" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Time</label>
                    <input type="time" id="scheduleTime" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl hover:bg-black transition transform active:scale-95">
                Confirm Schedule
            </button>
        </form>
    </div>
</div>
