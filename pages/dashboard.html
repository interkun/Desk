<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-6 md:p-8 mt-2">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">
                    <span id="greeting-time">GOOD MORNING</span> • OVERVIEW
                </p>
                <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">
                    Welcome back, <span id="user-name" class="text-indigo-600">Creator</span>
                </h1>
                <p class="text-[11px] font-bold text-slate-400 mt-2 flex items-center gap-2 uppercase tracking-widest">
                    <i class="fa-solid fa-circle-check text-emerald-500 text-[8px]"></i> Your business is performing well today
                </p>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="window.location.hash='#finance'; setTimeout(window.openFinanceModal, 500)" 
                    class="flex-1 md:flex-none bg-slate-900 text-white px-6 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl hover:bg-black transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i class="fas fa-plus"></i> New Income
                </button>
                <button onclick="window.location.hash='#projects'; setTimeout(window.openProjectModal, 500)" 
                    class="flex-1 md:flex-none bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-6 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-sm transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i class="fas fa-tasks text-indigo-500"></i> New Project
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        
        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:border-emerald-300 transition-all cursor-pointer group active:scale-[0.98]" onclick="window.location.hash='#finance'">
            <div class="flex justify-between items-start mb-4">
                <div class="w-10 h-10 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-lg shadow-sm">
                    <i class="fas fa-wallet"></i>
                </div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Revenue</span>
            </div>
            <h3 class="text-2xl font-black text-slate-800 tracking-tight group-hover:text-emerald-600 transition-colors truncate" id="dash-revenue">&#8377;0</h3>
            <p class="text-[9px] font-bold text-emerald-500/80 mt-1 uppercase tracking-widest">Monthly Growth</p>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:border-indigo-300 transition-all cursor-pointer group active:scale-[0.98]" onclick="window.location.hash='#projects'">
            <div class="flex justify-between items-start mb-4">
                <div class="w-10 h-10 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-lg shadow-sm">
                    <i class="fas fa-layer-group"></i>
                </div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Active</span>
            </div>
            <h3 class="text-2xl font-black text-slate-800 tracking-tight group-hover:text-indigo-600 transition-colors truncate" id="dash-projects">0</h3>
            <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Ongoing Tasks</p>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:border-orange-300 transition-all cursor-pointer group active:scale-[0.98]" onclick="window.location.hash='#booking'">
            <div class="flex justify-between items-start mb-4">
                <div class="w-10 h-10 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center text-lg shadow-sm">
                    <i class="fas fa-handshake"></i>
                </div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Leads</span>
            </div>
            <h3 class="text-2xl font-black text-slate-800 tracking-tight group-hover:text-orange-600 transition-colors truncate" id="dash-deals">0</h3>
            <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Potential Deals</p>
        </div>

        <div class="bg-yellow-50/50 p-6 rounded-[2rem] border border-yellow-100 shadow-sm hover:border-yellow-300 transition-all cursor-pointer group relative overflow-hidden active:scale-[0.98]" onclick="window.location.hash='#notekun'; setTimeout(window.openNoteModal, 300)">
            <div class="flex justify-between items-start mb-1 relative z-10">
                <div class="w-10 h-10 rounded-2xl bg-yellow-100 text-yellow-600 flex items-center justify-center text-lg shadow-sm">
                    <i class="fas fa-sticky-note"></i>
                </div>
                <span class="text-[9px] font-black text-yellow-600/60 uppercase tracking-widest">Sticky</span>
            </div>
            <p class="text-[11px] font-bold text-slate-600 mt-3 line-clamp-2 relative z-10 uppercase tracking-wide leading-relaxed" id="dash-note-preview">
                Capture an idea...
            </p>
            <i class="fas fa-pencil absolute -bottom-2 -right-2 text-6xl text-yellow-100/40 rotate-12 group-hover:scale-110 transition-transform"></i>
        </div>

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        
        <div class="lg:col-span-2 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full min-h-[400px]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-fire text-orange-500"></i> Priority Pipeline
                </h3>
                <button onclick="window.location.hash='#projects'" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest hover:underline underline-offset-4">Board View</button>
            </div>
            
            <div id="urgent-tasks-list" class="p-4 space-y-3 flex-1 overflow-y-auto custom-scrollbar bg-white">
                <div class="flex flex-col items-center justify-center h-full text-slate-300 py-20">
                    <i class="fas fa-circle-notch fa-spin text-xl mb-3 text-indigo-500"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest">Syncing Active Pipeline...</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full min-h-[400px]">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-bell text-blue-500"></i> Activity Feed
                </h3>
                <button onclick="window.location.hash='#inbox'" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:underline underline-offset-4">Inbox</button>
            </div>

            <div id="recent-activity-list" class="p-4 space-y-2 flex-1 overflow-y-auto custom-scrollbar bg-white">
                <div class="py-20 text-center">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-bolt-lightning text-slate-200 text-xl"></i>
                    </div>
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">No recent alerts</p>
                </div>
            </div>
        </div>

    </div>
</div>
