<div class="max-w-4xl mx-auto w-full animate-fade-in pb-24 pt-4 px-2 md:px-0">
    
    <div class="flex flex-row items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Notifications</h2>
            <p class="text-xs text-slate-500 font-medium mt-1">Stay updated with your activities</p>
        </div>
        <button id="mark-read-btn" onclick="window.NotifyPage.markAllRead()" class="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2.5 rounded-xl hover:bg-blue-100 transition active:scale-95 flex items-center gap-2">
            <i class="fa-solid fa-check-double"></i> <span class="hidden sm:inline">Mark all read</span>
        </button>
    </div>

    <div class="flex gap-3 mb-6">
        <button class="px-5 py-2 rounded-full bg-slate-900 text-white text-sm font-bold shadow-md active:scale-95 transition">All</button>
        <button class="px-5 py-2 rounded-full bg-white text-slate-500 text-sm font-bold hover:bg-slate-50 border border-slate-200 active:scale-95 transition">Unread</button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[400px] relative">
        
        <div id="full-notify-list" class="divide-y divide-slate-100 w-full">
            <div class="flex flex-col items-center justify-center py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500 mb-4"></i>
                <p class="text-slate-500 text-sm font-medium">Checking updates...</p>
            </div>
        </div>

        <div id="notify-empty" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white text-center p-10 z-10">
            <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-5 border border-slate-100">
                <i class="fa-regular fa-bell-slash text-4xl text-slate-300"></i>
            </div>
            <h3 class="text-slate-800 font-extrabold text-lg">All caught up!</h3>
            <p class="text-slate-500 text-sm mt-2 max-w-[250px]">You don't have any new notifications at the moment.</p>
            
            <button onclick="window.location.hash='#dashboard'" class="mt-6 px-6 py-2.5 bg-slate-900 text-white text-sm font-bold rounded-full shadow-lg active:scale-95 transition">
                Go to Home
            </button>
        </div>

    </div>
</div>
