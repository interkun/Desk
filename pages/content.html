<div class="w-full max-w-7xl mx-auto space-y-4 animate-fade-in pb-24 relative">

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-2">
        <div class="p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="w-full md:w-auto flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-box-archive text-blue-600"></i> Content Library
                    </h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Manage your products & services</p>
                </div>
                <button onclick="window.location.hash='#publish'" class="md:hidden bg-slate-900 text-white w-10 h-10 rounded-2xl shadow-lg hover:bg-black active:scale-95 transition flex items-center justify-center">
                    <i class="fas fa-plus text-sm"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="hidden sm:flex items-center gap-2 px-4 py-2.5 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span id="stat-total" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Loading...</span>
                </div>

                <button onclick="window.location.hash='#publish'" class="hidden md:flex bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-sm hover:bg-black active:scale-95 transition items-center gap-2">
                    <i class="fas fa-plus text-xs"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest">Create New</span>
                </button>
            </div>
        </div>
        <div class="bg-black p-2.5 flex items-center gap-2">
            <span class="text-slate-400 text-[11px] font-bold uppercase tracking-wider italic ml-2">Product Inventory</span>
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="flex gap-2 overflow-x-auto w-full md:w-auto no-scrollbar pb-1">
            <button onclick="window.filterContent('all')" id="filter-all" class="filter-btn active px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-900 text-white shadow-sm transition-all whitespace-nowrap">All</button>
            <button onclick="window.filterContent('call')" id="filter-call" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">1:1 Calls</button>
            <button onclick="window.filterContent('digital')" id="filter-digital" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">Digital Files</button>
            <button onclick="window.filterContent('webinar')" id="filter-webinar" class="filter-btn px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 transition-all whitespace-nowrap">Webinars</button>
        </div>

        <div class="relative w-full md:w-72">
            <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 text-xs"></i>
            <input type="text" onkeyup="window.handleSearchContent(event)" placeholder="SEARCH YOUR LIBRARY..." 
                class="w-full pl-10 pr-4 py-3 rounded-2xl bg-white border border-slate-200 outline-none text-[11px] font-black uppercase tracking-wider focus:border-blue-500 transition shadow-sm placeholder:text-slate-300">
        </div>
    </div>

    <div class="relative min-h-[400px]">
        <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div id="initial-loader" class="col-span-full flex flex-col items-center justify-center py-32">
                <div class="w-10 h-10 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing Library</p>
            </div>
        </div>

        <div id="content-empty" class="hidden flex-col items-center justify-center py-32 text-center">
            <div class="w-16 h-16 bg-white rounded-[2rem] border border-slate-100 flex items-center justify-center mb-4 shadow-sm">
                <i class="fa-solid fa-layer-group text-2xl text-slate-200"></i>
            </div>
            <h3 class="text-slate-800 font-black text-sm uppercase tracking-tight">Your library is empty</h3>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 mb-6">Create your first product or service</p>
            <button onclick="window.location.hash='#publish'" class="px-8 py-3.5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl hover:bg-black transition active:scale-95">
                Start Selling →
            </button>
        </div>
    </div>

</div>
